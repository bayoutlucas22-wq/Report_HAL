services:
  mongodb:
    image: mongo:7.0
    container_name: cortex-mongodb
    restart: always
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  hub:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: cortex-hub
    restart: always
    ports:
      - "3333:3333"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/hal_tejas_db
      - PORT=3333
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3333/dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongodb_data:
