services:
  app:
    build: .
    container_name: hal-tejas-app
    ports:
      - "3333:3333"
    restart: unless-stopped
    environment:
      - PORT=3333
      - NODE_ENV=production
      - MONGO_URL=mongodb://mongodb:27017/hal_tejas_db
    depends_on:
      mongodb:
        condition: service_healthy

  mongodb:
    image: mongo:7.0
    container_name: hal-tejas-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mongo-data:
