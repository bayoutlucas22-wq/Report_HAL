services:
  app:
    build: .
    container_name: hal-tejas-app
    ports:
      - "3333:3333"
    restart: unless-stopped
    environment:
      - PORT=3333
      - NODE_ENV=production
      - MONGO_URL=mongodb://mongodb:27017/hal_tejas_db
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    container_name: hal-tejas-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
