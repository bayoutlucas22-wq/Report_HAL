name: 'Audit-Ready Compliance CI/CD'

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  regulatory-audit:
    name: '🔒 Regulatory Dependency Audit'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Initialize Audit
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - name: Install & Audit
        run: |
          npm install
          npm audit --audit-level=high

  container-security:
    name: '🛡️ BV-Standard Container Scan'
    runs-on: ubuntu-latest
    needs: regulatory-audit
    steps:
      - uses: actions/checkout@v4
      - name: Build Dashboard Image
        run: |
          docker build -t hal-tejas-registry:audit .
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'hal-tejas-registry:audit'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  vercel-deployment:
    name: '🚀 Automated Production Deployment'
    runs-on: ubuntu-latest
    needs: container-security
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./
